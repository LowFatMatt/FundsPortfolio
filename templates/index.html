<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FundsPortfolio | Smart Investing</title>
    <!-- Modern Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <header style="text-align: center; margin-bottom: 2rem; max-width: 600px; animation: fadeIn 0.4s ease-out;">
        <h1 style="font-size: 2.8rem; margin-bottom: 0.5rem;">FundsPortfolio</h1>
        <p class="subtitle">Discover your personalized data-driven investment strategy.</p>
    </header>

    <main class="container">
        
        <!-- Loading State -->
        <div id="loading-view" class="glass-card" style="text-align: center; padding: 4rem 2rem;">
            <div class="loading-spinner" style="border-color: rgba(88, 166, 255, 0.2); border-top-color: var(--accent); width: 40px; height: 40px;"></div>
            <h3 style="margin-top: 1.5rem; margin-bottom: 0; color: var(--text-secondary);">Initializing engine...</h3>
        </div>

        <!-- Questionnaire Form -->
        <div id="form-view" class="glass-card hidden">
            <h2>Build Your Profile</h2>
            <div id="error-view" class="alert alert-error hidden">
                <p id="error-message"></p>
            </div>
            
            <form id="questionnaire-form">
                <!-- Dynamically populated by JS -->
                <div id="questionnaire-fields"></div>

                <div class="form-group" style="margin-top: 3rem;">
                    <button type="submit" id="submit-btn" class="btn btn-primary">
                        <span id="btn-spinner" class="loading-spinner hidden"></span>
                        <span id="btn-text">Generate Portfolio</span>
                    </button>
                </div>
            </form>
        </div>

        <!-- Results Display -->
        <div id="results-view" class="glass-card hidden">
            <div class="results-header form-group">
                <div>
                    <h2>Your Portfolio Strategy</h2>
                    <p style="color: var(--text-secondary);">Optimized for max Sharpe Ratio</p>
                </div>
                <div class="portfolio-score">
                    <div id="score-val" class="score-value">--</div>
                    <div class="score-label">Risk Profile</div>
                </div>
            </div>

            <!-- List of recommendations -->
            <div id="recommendations-list" class="fund-list form-group">
                <!-- Dynamically populated -->
            </div>

            <div class="form-group" style="margin-top: 2rem;">
                <button id="restart-btn" class="btn" style="background: rgba(48, 54, 61, 0.5); color: var(--text-primary); border: 1px solid var(--card-border);">
                    ← Start Over
                </button>
            </div>
        </div>

    </main>

    <footer style="margin-top: 4rem; text-align: center; color: var(--text-secondary); font-size: 0.85rem;">
        <p>&copy; 2026 FundsPortfolio Prototype. Phase 4 MVP.</p>
    </footer>

    <!-- Custom JS -->
    <script src="/static/js/app.js"></script>
</body>
</html>
